  <style type="text/tailwindcss">

      html.dark { color-scheme: dark; }
      body {
        @apply bg-base text-textBody;
        min-height: 100vh;
        transition: background-color 220ms ease, color 220ms ease;
        background-image: radial-gradient(circle at top left, rgba(52, 211, 153, 0.2), transparent 28%), radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 24%);
      }
      h1, h2, h3, h4, th { @apply text-textHeader; }

    .btn-primary { @apply inline-block bg-primary text-white rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-md transition-all hover:scale-[1.02] active:bg-secondary whitespace-nowrap cursor-pointer; }
    .btn-secondary { @apply inline-block bg-white text-textBody border border-stone200 rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-sm transition-all hover:scale-[1.02] whitespace-nowrap cursor-pointer; }
    .nav-btn { @apply bg-white text-textBody rounded-full px-6 py-2 font-display font-medium shadow-sm border border-stone200 transition-all hover:scale-[1.02] cursor-pointer text-sm; }
    
    .card { @apply bg-white shadow-sm border border-stone200 p-10 md:p-16 rounded-[32px] mb-10; }
    .badge { @apply inline-block px-4 py-2 font-display font-medium tracking-wider rounded-full shadow-sm; }
    .strong-hire { @apply bg-primary/20 text-textHeader; }
    .hire        { @apply bg-secondary/20 text-textHeader border border-secondary/30; }
    .no-hire     { @apply bg-[#ff6b6b]/10 text-[#991b1b] border border-[#ff6b6b]/30; }

    .theme-toggle { backdrop-filter: blur(18px); }

    html.dark body {
      background-color: #0F172A;
      background-image: radial-gradient(circle at top left, rgba(52, 211, 153, 0.16), transparent 24%), radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 22%), linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 1));
    }

    html.dark .bg-white,
    html.dark .card {
      background-color: rgba(15, 23, 42, 0.78) !important;
    }

    html.dark .bg-base,
    html.dark .bg-base\/70 {
      background-color: rgba(15, 23, 42, 0.72) !important;
    }

    html.dark .bg-stone200,
    html.dark .bg-stone200\/20,
    html.dark .bg-stone200\/30,
    html.dark .bg-stone200\/40,
    html.dark .bg-stone200\/50 {
      background-color: rgba(148, 163, 184, 0.12) !important;
    }

    html.dark .border-stone200 {
      border-color: rgba(148, 163, 184, 0.22) !important;

    html.dark .text-textBody,
    html.dark .text-dark {
      color: #CBD5E1 !important;
    }

    html.dark .text-textBody\/70 {
      color: rgba(148, 163, 184, 0.95) !important;
    }

    html.dark .text-textHeader {
      color: #ECFDF5 !important;
    }

    html.dark .text-stone200 {
      color: rgba(148, 163, 184, 0.78) !important;
    }

    html.dark .bg-primary\/10 { background-color: rgba(16, 185, 129, 0.18) !important; }
    html.dark .bg-primary\/20 { background-color: rgba(16, 185, 129, 0.22) !important; }
    html.dark .bg-secondary\/20 { background-color: rgba(52, 211, 153, 0.18) !important; }

    html.dark .btn-secondary,
    html.dark .nav-btn,
    html.dark .theme-toggle {
      background-color: rgba(15, 23, 42, 0.84) !important;
      color: #E2E8F0 !important;
      border-color: rgba(148, 163, 184, 0.22) !important;
    }

    html.dark .shadow-sm,
    html.dark .shadow-md,
    html.dark .shadow-xl {
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.25) !important;
    }

    html.dark .hover\:bg-stone200\/30:hover { background-color: rgba(148, 163, 184, 0.14) !important; }
    html.dark .hover\:text-rebel:hover { color: #6EE7B7 !important; }

    html.dark .no-hire {
      color: #FECACA !important;
      border-color: rgba(248, 113, 113, 0.3) !important;
    }

    @media print {
      header, .back, .toolbar { display: none !important; }
      body { @apply bg-white; }
      .card { box-shadow: none !important; border: 2px solid #E5E7EB !important; page-break-inside: avoid; }
      .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }

</head>
<body>
  <header class="bg-base/70 backdrop-blur-xl border-b border-stone200 text-textHeader p-6 md:px-10 flex justify-between items-center z-50 sticky top-0 mb-12">
    <h1 class="font-display text-3xl font-semibold tracking-tight text-textHeader">Interviewer</h1>
    <div class="flex items-center gap-3">
      <button id="themeToggle" class="nav-btn theme-toggle !px-4 flex items-center gap-3" type="button" onclick="toggleTheme()" aria-label="Toggle color theme">
        <span class="h-2.5 w-2.5 rounded-full bg-primary shadow-[0_0_0_4px_rgba(16,185,129,0.16)]"></span>
        <span id="themeToggleLabel" class="text-xs sm:text-sm">Dark mode</span>
      </button>
      <nav class="hidden md:flex gap-6 items-center">
        <a href="<?= webAppUrl ?>?page=candidates" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Candidates</a>
        <a href="<?= webAppUrl ?>?page=summary" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Summary</a>
        <? if (isAdmin) { ?><a href="<?= webAppUrl ?>?page=admin" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Admin</a><? } ?>
        <div class="flex items-center gap-6 ml-4">
          <span class="text-sm font-bold text-textBody"><?= userEmail ?></span>
          <a class="nav-btn" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
        </div>
      </nav>
    </div>
  </header>

  <div class="max-w-[1000px] mx-auto p-6 md:p-10 mt-4">
    <a class="inline-block font-display font-medium tracking-wide tracking-tight text-dark border-none opacity-80 mb-8 hover:text-rebel hover:border-rebel transition-colors" href="<?= webAppUrl ?>?page=summary" target="_top">← Back to Summary</a>

    <div class="toolbar flex flex-col sm:flex-row justify-end gap-6 mb-12">
      <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
      <button class="btn-primary" onclick="window.print()">Print / Save PDF</button>
    </div>

    <div id="reportContent">
      <div class="p-12 text-center font-bold text-xl uppercase tracking-tight">Loading report…</div>
    </div>
  </div>

  <?!= include('html/shared/theme-utils'); ?>
  <script>
    var candidateId = '<?= candidateId ?>';
    var APP_URL     = '<?= webAppUrl ?>';
    var reportData  = { candidate: null, evaluations: [], summary: null };

    function escHtml(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }
    function fmt(v) { return (v !== undefined && v !== null && v !== '' && !isNaN(v)) ? Number(v).toFixed(1) : '—'; }

    function recBadge(rec) {
      if (!rec) return '';
      var cls = rec === 'Strong Hire' ? 'strong-hire' : rec === 'Hire' ? 'hire' : 'no-hire';
      return '<span class="badge ' + cls + '">' + escHtml(rec) + '</span>';
    }

    function renderReport() {
      var c = reportData.candidate;
      var evals = reportData.evaluations;
      var scores = reportData.summary;

      if (!c) {
        document.getElementById('reportContent').innerHTML = '<div class="p-12 text-center font-bold text-xl uppercase tracking-tight text-[#ff6b6b]">Candidate not found.</div>';
        return;
      }

      var rec = scores ? (scores.finalScore >= 8 ? 'Strong Hire' : scores.finalScore >= 6 ? 'Hire' : 'No Hire') : '';

      var html = '';

      // Candidate info + recommendation
      html += '<div class="card">';
      html += '<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6 border-b border-stone200 pb-6">';
      html += '<div><h2 class="font-display text-5xl font-semibold tracking-tight text-textHeader mb-2">' + escHtml(c.name) + '</h2>';
      html += '<div class="font-medium text-lg text-textBody">' + escHtml(c.position) + (c.level ? ' <span class="text-stone200 mx-2">|</span> ' + escHtml(c.level) : '') + '</div>';
      html += '<div class="font-medium text-textBody/70 mt-1 uppercase text-sm tracking-wide">Status: ' + escHtml(c.status) + '</div></div>';
      if (rec) html += '<div>' + recBadge(rec) + '</div>';
      html += '</div>';

      // Aggregated score cards
      if (scores) {
        html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-6">';
        html += scoreCard('Tech', scores.avgTechnical);
        html += scoreCard('Leadership', scores.avgLeadership);
        html += scoreCard('Stakeholder', scores.avgStakeholder);
        html += '<div class="border border-stone200 p-6 bg-primary/10 shadow-sm flex flex-col justify-center items-center text-center rounded-[24px]"><div class="font-display font-medium tracking-wide text-xs tracking-widest mb-1 text-textHeader">Final</div><div class="font-semibold text-3xl text-textHeader">' + fmt(scores.finalScore) + '</div></div>';
        html += '</div>';
      }
      html += '</div>'; // end card

      // Individual evaluations
      html += '<div class="card p-0 overflow-hidden">';
      html += '<h3 class="font-semibold text-2xl tracking-tight p-6 border-b border-stone200 bg-stone200/20 text-textHeader">Evaluations (' + evals.length + ')</h3>';
      if (!evals.length) {
        html += '<p class="p-10 font-medium text-textBody/60 text-center">No evaluations submitted yet.</p>';
      } else {
        html += '<div class="overflow-x-auto"><table class="w-full text-left border-collapse" ><thead><tr class="bg-base border-b border-stone200">';
        html += '<th class="p-6 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Interviewer</th>';
        html += '<th class="p-6 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Tech</th>';
        html += '<th class="p-6 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Leadership</th>';
        html += '<th class="p-6 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Stakeholder</th>';
        html += '<th class="p-6 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Notes</th>';
        html += '<th class="p-6 font-display font-medium tracking-wide text-textHeader">Date</th>';
        html += '</tr></thead><tbody>';
        evals.forEach(function(ev) {
          html += '<tr class="hover:bg-stone200/30 font-medium border-b border-stone200 last:border-b-0 group transition-colors">';
          html += '<td class="p-6 border-r border-stone200 font-semibold">' + escHtml(ev.interviewerEmail) + '</td>';
          html += '<td class="p-6 border-r border-stone200 text-center text-lg">' + ev.scores.technical + '</td>';
          html += '<td class="p-6 border-r border-stone200 text-center text-lg">' + ev.scores.leadership + '</td>';
          html += '<td class="p-6 border-r border-stone200 text-center text-lg">' + ev.scores.stakeholder + '</td>';
          html += '<td class="p-6 border-r border-stone200 text-sm max-w-[250px] italic">' + escHtml(ev.notes || '—') + '</td>';
          html += '<td class="p-6 whitespace-nowrap">' + escHtml((ev.submittedAt || '').substring(0, 10)) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      document.getElementById('reportContent').innerHTML = html;
    }

    function scoreCard(label, val) {
      return '<div class="border border-stone200 p-6 bg-white shadow-sm flex flex-col justify-center items-center text-center rounded-[24px]"><div class="font-display font-medium tracking-wide text-xs tracking-widest text-textBody/70 mb-1">' + escHtml(label) + '</div><div class="font-semibold text-2xl">' + fmt(val) + '</div></div>';
    }

    function exportCSV() {
      if (!reportData.evaluations.length) return;
      var headers = ['Interviewer', 'Technical', 'Leadership', 'Stakeholder', 'Notes', 'Date'];
      var rows = reportData.evaluations.map(function(ev) {
        return [
          ev.interviewerEmail,
          ev.scores.technical, ev.scores.leadership, ev.scores.stakeholder,
          ev.notes || '', (ev.submittedAt || '').substring(0, 10)
        ].map(function(v) { return '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"'; }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      var name = reportData.candidate ? reportData.candidate.name.replace(/[^a-z0-9]/gi, '-').toLowerCase() : 'candidate';
      a.href = url; a.download = name + '-report.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    // Load candidate and evaluations in parallel via sequential calls
    var loaded = 0;
    function checkAllLoaded() {
      loaded++;
      if (loaded >= 2) renderReport();
    }

    google.script.run
      .withSuccessHandler(function(c) { reportData.candidate = c; checkAllLoaded(); })
      .withFailureHandler(function() { checkAllLoaded(); })
      .getCandidateDetail(candidateId);

    google.script.run
      .withSuccessHandler(function(evals) {
        reportData.evaluations = evals || [];
        // compute summary from evaluations client-side
        if (evals && evals.length) {
          function avgOf(field) {
            var sum = 0;
            evals.forEach(function(e) { sum += e.scores[field]; });
            return Math.round(sum / evals.length * 100) / 100;
          }
          var avgT = avgOf('technical');
          var avgL = avgOf('leadership');
          var avgS = avgOf('stakeholder');
          reportData.summary = {
            avgTechnical: avgT,
            avgLeadership: avgL,
            avgStakeholder: avgS,
            finalScore: Math.round((avgT + avgL + avgS) / 3 * 100) / 100
          };
        }
        checkAllLoaded();
      })
      .withFailureHandler(function() { checkAllLoaded(); })
      .getEvaluations(candidateId);

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Report — Interviewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Epilogue', 'sans-serif'], display: ['Epilogue', 'sans-serif'] },
          colors: { 
            base: '#FAFAF9', 
            dark: '#0F172A', 
            primary: '#10B981', 
            secondary: '#34D399',
            textBody: '#44403C',
            textHeader: '#064E3B',
            stone200: '#E5E7EB',
            rebel: '#10B981'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-base text-textBody; }
      h1, h2, h3, h4, th { @apply text-textHeader; }
    }
    .btn-primary { @apply inline-block bg-primary text-white rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-md transition-all hover:scale-[1.02] active:bg-secondary whitespace-nowrap cursor-pointer; }
    .btn-secondary { @apply inline-block bg-white text-textBody border border-stone200 rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-sm transition-all hover:scale-[1.02] whitespace-nowrap cursor-pointer; }
    .nav-btn { @apply bg-white text-textBody rounded-full px-6 py-2 font-display font-medium shadow-sm border border-stone200 transition-all hover:scale-[1.02] cursor-pointer text-sm; }
    
    .card { @apply bg-white shadow-sm border border-stone200 p-8 md:p-12 rounded-3xl mb-10; }
    .badge { @apply inline-block px-4 py-2 font-display font-medium tracking-wider rounded-full shadow-sm; }
    .strong-hire { @apply bg-primary/20 text-textHeader; }
    .hire        { @apply bg-secondary/20 text-textHeader border border-secondary/30; }
    .no-hire     { @apply bg-[#ff6b6b]/10 text-[#991b1b] border border-[#ff6b6b]/30; }

    @media print {
      header, .back, .toolbar { display: none !important; }
      body { @apply bg-white; }
      .card { box-shadow: none !important; border: 2px solid #E5E7EB !important; page-break-inside: avoid; }
      .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
    }
  </style>
</head>
<body>
  <header class="bg-base/80 backdrop-blur-xl border-b border-stone200 text-textHeader p-6 md:px-10 flex justify-between items-center z-50 sticky top-0 mb-8">
    <h1 class="font-display text-3xl font-semibold tracking-tight text-textHeader">Interviewer</h1>
    <nav class="hidden md:flex gap-6 items-center">
      <a href="<?= webAppUrl ?>?page=candidates" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Candidates</a>
      <a href="<?= webAppUrl ?>?page=summary" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Summary</a>
      <? if (isAdmin) { ?><a href="<?= webAppUrl ?>?page=admin" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Admin</a><? } ?>
      <div class="flex items-center gap-4 ml-4">
        <span class="text-sm font-bold text-textBody"><?= userEmail ?></span>
        <a class="nav-btn" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
      </div>
    </nav>
  </header>

  <div class="max-w-[1000px] mx-auto p-4 md:p-8 mt-4">
    <a class="inline-block font-display font-medium tracking-wide tracking-tight text-dark border-none opacity-80 mb-6 hover:text-rebel hover:border-rebel transition-colors" href="<?= webAppUrl ?>?page=summary" target="_top">← Back to Summary</a>

    <div class="toolbar flex flex-col sm:flex-row justify-end gap-4 mb-8">
      <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
      <button class="btn-primary" onclick="window.print()">Print / Save PDF</button>
    </div>

    <div id="reportContent">
      <div class="p-12 text-center font-bold text-xl uppercase tracking-tight">Loading report…</div>
    </div>
  </div>

  <script>
    var candidateId = '<?= candidateId ?>';
    var APP_URL     = '<?= webAppUrl ?>';
    var reportData  = { candidate: null, evaluations: [], summary: null };

    function escHtml(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }
    function fmt(v) { return (v !== undefined && v !== null && v !== '' && !isNaN(v)) ? Number(v).toFixed(1) : '—'; }

    function recBadge(rec) {
      if (!rec) return '';
      var cls = rec === 'Strong Hire' ? 'strong-hire' : rec === 'Hire' ? 'hire' : 'no-hire';
      return '<span class="badge ' + cls + '">' + escHtml(rec) + '</span>';
    }

    function renderReport() {
      var c = reportData.candidate;
      var evals = reportData.evaluations;
      var scores = reportData.summary;

      if (!c) {
        document.getElementById('reportContent').innerHTML = '<div class="p-12 text-center font-bold text-xl uppercase tracking-tight text-[#ff6b6b]">Candidate not found.</div>';
        return;
      }

      var rec = scores ? (scores.finalScore >= 8 ? 'Strong Hire' : scores.finalScore >= 6 ? 'Hire' : 'No Hire') : '';

      var html = '';

      // Candidate info + recommendation
      html += '<div class="card">';
      html += '<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-stone200 pb-6">';
      html += '<div><h2 class="font-display text-5xl font-semibold tracking-tight text-textHeader mb-2">' + escHtml(c.name) + '</h2>';
      html += '<div class="font-medium text-lg text-textBody">' + escHtml(c.position) + (c.level ? ' <span class="text-stone200 mx-2">|</span> ' + escHtml(c.level) : '') + '</div>';
      html += '<div class="font-medium text-textBody/70 mt-1 uppercase text-sm tracking-wide">Status: ' + escHtml(c.status) + '</div></div>';
      if (rec) html += '<div>' + recBadge(rec) + '</div>';
      html += '</div>';

      // Aggregated score cards
      if (scores) {
        html += '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">';
        html += scoreCard('Tech', scores.avgTechnical);
        html += scoreCard('Problem', scores.avgProblemSolving);
        html += scoreCard('Comm', scores.avgCommunication);
        html += scoreCard('System', scores.avgSystemDesign);
        html += scoreCard('Culture', scores.avgCultureFit);
        html += '<div class="border border-stone200 p-4 bg-primary/10 shadow-sm flex flex-col justify-center items-center text-center rounded-xl"><div class="font-display font-medium tracking-wide text-xs tracking-widest mb-1 text-textHeader">Final</div><div class="font-semibold text-3xl text-textHeader">' + fmt(scores.finalScore) + '</div></div>';
        html += '</div>';
      }
      html += '</div>'; // end card

      // Individual evaluations
      html += '<div class="card p-0 overflow-hidden">';
      html += '<h3 class="font-semibold text-2xl tracking-tight p-6 border-b border-stone200 bg-stone200/20 text-textHeader">Evaluations (' + evals.length + ')</h3>';
      if (!evals.length) {
        html += '<p class="p-8 font-medium text-textBody/60 text-center">No evaluations submitted yet.</p>';
      } else {
        html += '<div class="overflow-x-auto"><table class="w-full text-left border-collapse" ><thead><tr class="bg-base border-b border-stone200">';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Interviewer</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Tech</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Prob</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Comm</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Sys</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Cult</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader border-r border-stone200">Notes</th>';
        html += '<th class="p-4 font-display font-medium tracking-wide text-textHeader">Date</th>';
        html += '</tr></thead><tbody>';
        evals.forEach(function(ev) {
          html += '<tr class="hover:bg-stone200/30 font-medium border-b border-stone200 last:border-b-0 group transition-colors">';
          html += '<td class="p-4 border-r border-stone200 font-semibold">' + escHtml(ev.interviewerEmail) + '</td>';
          html += '<td class="p-4 border-r border-stone200 text-center text-lg">' + ev.scores.technicalSkills + '</td>';
          html += '<td class="p-4 border-r border-stone200 text-center text-lg">' + ev.scores.problemSolving + '</td>';
          html += '<td class="p-4 border-r border-stone200 text-center text-lg">' + ev.scores.communication + '</td>';
          html += '<td class="p-4 border-r border-stone200 text-center text-lg">' + ev.scores.systemDesign + '</td>';
          html += '<td class="p-4 border-r border-stone200 text-center text-lg">' + ev.scores.cultureFit + '</td>';
          html += '<td class="p-4 border-r border-stone200 text-sm max-w-[250px] italic">' + escHtml(ev.notes || '—') + '</td>';
          html += '<td class="p-4 whitespace-nowrap">' + escHtml((ev.submittedAt || '').substring(0, 10)) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      document.getElementById('reportContent').innerHTML = html;
    }

    function scoreCard(label, val) {
      return '<div class="border border-stone200 p-4 bg-white shadow-sm flex flex-col justify-center items-center text-center rounded-xl"><div class="font-display font-medium tracking-wide text-xs tracking-widest text-textBody/70 mb-1">' + escHtml(label) + '</div><div class="font-semibold text-2xl">' + fmt(val) + '</div></div>';
    }

    function exportCSV() {
      if (!reportData.evaluations.length) return;
      var headers = ['Interviewer', 'Technical', 'Problem Solving', 'Communication', 'System Design', 'Culture Fit', 'Notes', 'Date'];
      var rows = reportData.evaluations.map(function(ev) {
        return [
          ev.interviewerEmail,
          ev.scores.technicalSkills, ev.scores.problemSolving, ev.scores.communication,
          ev.scores.systemDesign, ev.scores.cultureFit,
          ev.notes || '', (ev.submittedAt || '').substring(0, 10)
        ].map(function(v) { return '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"'; }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      var name = reportData.candidate ? reportData.candidate.name.replace(/[^a-z0-9]/gi, '-').toLowerCase() : 'candidate';
      a.href = url; a.download = name + '-report.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    // Load candidate and evaluations in parallel via sequential calls
    var loaded = 0;
    function checkAllLoaded() {
      loaded++;
      if (loaded >= 2) renderReport();
    }

    google.script.run
      .withSuccessHandler(function(c) { reportData.candidate = c; checkAllLoaded(); })
      .withFailureHandler(function() { checkAllLoaded(); })
      .getCandidateDetail(candidateId);

    google.script.run
      .withSuccessHandler(function(evals) {
        reportData.evaluations = evals || [];
        // compute summary from evaluations client-side
        if (evals && evals.length) {
          function avgOf(field) {
            var sum = 0;
            evals.forEach(function(e) { sum += e.scores[field]; });
            return Math.round(sum / evals.length * 100) / 100;
          }
          var avgT = avgOf('technicalSkills');
          var avgP = avgOf('problemSolving');
          var avgC = avgOf('communication');
          var avgS = avgOf('systemDesign');
          var avgF = avgOf('cultureFit');
          reportData.summary = {
            avgTechnical: avgT, avgProblemSolving: avgP, avgCommunication: avgC,
            avgSystemDesign: avgS, avgCultureFit: avgF,
            finalScore: Math.round((avgT + avgP + avgC + avgS + avgF) / 5 * 100) / 100
          };
        }
        checkAllLoaded();
      })
      .withFailureHandler(function() { checkAllLoaded(); })
      .getEvaluations(candidateId);
  </script>
</body>
</html>

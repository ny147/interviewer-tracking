      background-image: radial-gradient(circle at top left, rgba(52, 211, 153, 0.16), transparent 24%), radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 22%), linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 1));
    }

    html.dark .bg-white {

    }

    html.dark .bg-base,
    html.dark .bg-base\/70 {
      background-color: rgba(15, 23, 42, 0.72) !important;
    }

    html.dark .bg-stone200,
    html.dark .bg-stone200\/20,

    html.dark .bg-stone200\/40,
    html.dark .bg-stone200\/50 {

    html.dark .bg-primary\/10 { background-color: rgba(16, 185, 129, 0.18) !important; }
    html.dark .bg-primary\/20 { background-color: rgba(16, 185, 129, 0.22) !important; }

    html.dark .bg-secondary\/20 { background-color: rgba(52, 211, 153, 0.18) !important; }

    html.dark .nav-btn,
    html.dark .theme-toggle {
      background-color: rgba(15, 23, 42, 0.84) !important;
      color: #E2E8F0 !important;
      border-color: rgba(148, 163, 184, 0.22) !important;
    }

    html.dark .shadow-sm,
    html.dark .shadow-md,
    html.dark .shadow-xl {
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.25) !important;
    }

    html.dark .hover\:bg-stone200\/30:hover { background-color: rgba(148, 163, 184, 0.14) !important; }

    html.dark .hover\:text-textHeader:hover { color: #ECFDF5 !important; }

  <?!= include('html/shared/theme-utils'); ?>
  <script>
    var allData = [];
    var sortKey = 'finalScore';
    var sortAsc = false;

    function badge(rec) {
      var cls = rec === 'Strong Hire' ? 'strong-hire' : rec === 'Hire' ? 'hire' : 'no-hire';
      return '<span class="badge ' + cls + '">' + escHtml(rec || '—') + '</span>';
    }
    function fmt(v) { return (v !== undefined && v !== '' && v !== null && !isNaN(v)) ? Number(v).toFixed(1) : '—'; }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }

    function renderTable(list) {
      var tbody = document.getElementById('tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-10 text-center font-bold text-gray-500">No data yet.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(function (c) {
        var rec = c.recommendation || '';
        var rowCls = rec === 'Strong Hire' ? ' bg-primary/5 hover:bg-stone200/50' : ' hover:bg-stone200/30';
        return '<tr class="border-b border-stone200 last:border-b-0 cursor-pointer font-medium' + rowCls + '">' +
          '<td class="p-6 border-r border-stone200 font-semibold">' + escHtml(c.name) + '</td>' +
          '<td class="p-6 border-r border-stone200">' + escHtml(c.position) + '</td>' +
          '<td class="p-6 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgTechnical) + '</td>' +
          '<td class="p-6 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgLeadership) + '</td>' +
          '<td class="p-6 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgStakeholder) + '</td>' +
          '<td class="p-6 border-r border-stone200 tabular-nums font-semibold text-lg bg-primary/5">' + fmt(c.finalScore) + '</td>' +
          '<td class="p-6">' + badge(rec) + '</td>' +
          '</tr>';
      }).join('');
    }

    function sortBy(key) {
      if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = false; }
      // Update sort icons
      document.querySelectorAll('th span.text-xs').forEach(function (thSpan) {
        thSpan.textContent = '↕';
        thSpan.classList.remove('opacity-100');
        thSpan.classList.add('opacity-50');
      });
      var iconEl = document.getElementById('sort-' + key);
      if (iconEl) {
        iconEl.classList.remove('opacity-50');
        iconEl.classList.add('opacity-100');
        iconEl.textContent = sortAsc ? '↑' : '↓';
      }
      var sorted = allData.slice().sort(function (a, b) {
        var va = a[key] !== undefined ? a[key] : '';
        var vb = b[key] !== undefined ? b[key] : '';
        if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
        return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
      renderTable(sorted);
    }

    function exportCSV() {
      if (!allData.length) return;
      var headers = ['Name', 'Position', 'Technical', 'Leadership', 'Stakeholder', 'Final Score', 'Recommendation'];
      var rows = allData.map(function (c) {
        return [c.name, c.position, c.avgTechnical, c.avgLeadership, c.avgStakeholder, c.finalScore, c.recommendation || ''].map(function (v) {
          return '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"';
        }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'candidate-summary.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    google.script.run
      .withSuccessHandler(function (list) {
        allData = list;
        sortBy('finalScore'); // default sort: highest final score first
      })
      .withFailureHandler(function (e) {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="7" class="p-10 text-center font-bold text-[#b91c1c]">' + escHtml(e.message || e) + '</td></tr>';
      })
      .getSummary();

  </script>
</body>

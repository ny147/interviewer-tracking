<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary Dashboard — Interviewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Epilogue', 'sans-serif'], display: ['Epilogue', 'sans-serif'] },
          colors: { 
            base: '#FAFAF9', 
            dark: '#0F172A', 
            primary: '#10B981', 
            secondary: '#34D399',
            textBody: '#44403C',
            textHeader: '#064E3B',
            stone200: '#E5E7EB',
            rebel: '#10B981' // Kept for existing badge compatibility, but maps to Emerald
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-base text-textBody; }
      h1, h2, h3, h4, th { @apply text-textHeader; }
    }
    .btn-primary { @apply inline-block bg-primary text-white rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-md transition-all hover:scale-[1.02] active:bg-secondary whitespace-nowrap cursor-pointer; }
    .nav-btn { @apply bg-white text-textBody rounded-full px-6 py-2 font-display font-medium shadow-sm border border-stone200 transition-all hover:scale-[1.02] cursor-pointer text-sm; }
    .badge { @apply inline-block px-4 py-2 font-display font-medium tracking-wider rounded-full shadow-sm; }
    .strong-hire { @apply bg-primary/20 text-textHeader; }
    .hire        { @apply bg-secondary/20 text-textHeader border border-secondary/30; }
    .no-hire     { @apply bg-[#ff6b6b]/10 text-[#991b1b] border border-[#ff6b6b]/30; }
  </style>
</head>

<body>
  <header
    class="bg-base/80 backdrop-blur-xl border-b border-stone200 text-textHeader p-6 md:px-10 flex justify-between items-center z-50 sticky top-0 mb-8">
    <h1 class="font-display text-3xl font-semibold tracking-tight text-textHeader">Interviewer</h1>
    <nav class="hidden md:flex gap-6 items-center">
      <a href="<?= webAppUrl ?>?page=candidates" target="_top"
        class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Candidates</a>
      <a href="<?= webAppUrl ?>?page=summary" target="_top"
        class="font-display font-semibold tracking-wide text-primary border-b-2 border-primary p-1">Summary</a>
      <? if (isAdmin) { ?><a href="<?= webAppUrl ?>?page=admin" target="_top"
        class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Admin</a>
      <? } ?>
      <div class="flex items-center gap-4 ml-4">
        <span class="text-sm font-bold text-textBody">
          <?= userEmail ?>
        </span>
        <a class="nav-btn" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
      </div>
    </nav>
  </header>

  <div class="max-w-[1200px] mx-auto p-4 md:p-8 mt-4">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <h2 class="font-display text-4xl font-medium tracking-tight">Summary Dashboard</h2>
      <button class="btn-primary" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="overflow-x-auto bg-white border border-stone200 shadow-sm rounded-3xl">
      <table id="summaryTable" class="w-full border-collapse">
        <thead>
          <tr class="bg-base select-none border-b border-stone200">
            <th onclick="sortBy('name')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors">
              Candidate <span class="text-xs opacity-50 ml-1 inline-block" id="sort-name">↕</span></th>
            <th onclick="sortBy('position')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors">
              Position <span class="text-xs opacity-50 ml-1 inline-block" id="sort-position">↕</span></th>
            <th onclick="sortBy('avgTechnical')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors hidden md:table-cell">
              Tech <span class="text-xs opacity-50 ml-1 inline-block" id="sort-avgTechnical">↕</span></th>
            <th onclick="sortBy('avgProblemSolving')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors hidden md:table-cell">
              Prob <span class="text-xs opacity-50 ml-1 inline-block" id="sort-avgProblemSolving">↕</span></th>
            <th onclick="sortBy('avgCommunication')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors hidden md:table-cell">
              Comm <span class="text-xs opacity-50 ml-1 inline-block" id="sort-avgCommunication">↕</span></th>
            <th onclick="sortBy('avgSystemDesign')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors hidden md:table-cell">
              Sys <span class="text-xs opacity-50 ml-1 inline-block" id="sort-avgSystemDesign">↕</span></th>
            <th onclick="sortBy('avgCultureFit')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors hidden md:table-cell">
              Cult <span class="text-xs opacity-50 ml-1 inline-block" id="sort-avgCultureFit">↕</span></th>
            <th onclick="sortBy('finalScore')"
              class="p-4 text-left font-display font-medium tracking-wide border-r border-stone200 cursor-pointer hover:bg-stone200/30 transition-colors bg-primary/10">
              Final <span class="text-xs opacity-50 ml-1 inline-block" id="sort-finalScore">↕</span></th>
            <th onclick="sortBy('recommendation')"
              class="p-4 text-left font-display font-medium tracking-wide cursor-pointer hover:bg-stone200/30 transition-colors">
              Rec <span class="text-xs opacity-50 ml-1 inline-block" id="sort-recommendation">↕</span></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr>
            <td colspan="9" class="p-8 text-center font-bold text-gray-500">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    var allData = [];
    var sortKey = 'finalScore';
    var sortAsc = false;

    function badge(rec) {
      var cls = rec === 'Strong Hire' ? 'strong-hire' : rec === 'Hire' ? 'hire' : 'no-hire';
      return '<span class="badge ' + cls + '">' + escHtml(rec || '—') + '</span>';
    }
    function fmt(v) { return (v !== undefined && v !== '' && v !== null && !isNaN(v)) ? Number(v).toFixed(1) : '—'; }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }

    function renderTable(list) {
      var tbody = document.getElementById('tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="p-8 text-center font-bold text-gray-500">No data yet.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(function (c) {
        var rec = c.recommendation || '';
        var rowCls = rec === 'Strong Hire' ? ' bg-primary/5 hover:bg-stone200/50' : ' hover:bg-stone200/30';
        return '<tr class="border-b border-stone200 last:border-b-0 cursor-pointer font-medium' + rowCls + '">' +
          '<td class="p-4 border-r border-stone200 font-semibold">' + escHtml(c.name) + '</td>' +
          '<td class="p-4 border-r border-stone200">' + escHtml(c.position) + '</td>' +
          '<td class="p-4 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgTechnical) + '</td>' +
          '<td class="p-4 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgProblemSolving) + '</td>' +
          '<td class="p-4 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgCommunication) + '</td>' +
          '<td class="p-4 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgSystemDesign) + '</td>' +
          '<td class="p-4 border-r border-stone200 hidden md:table-cell tabular-nums">' + fmt(c.avgCultureFit) + '</td>' +
          '<td class="p-4 border-r border-stone200 tabular-nums font-semibold text-lg bg-primary/5">' + fmt(c.finalScore) + '</td>' +
          '<td class="p-4">' + badge(rec) + '</td>' +
          '</tr>';
      }).join('');
    }

    function sortBy(key) {
      if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = false; }
      // Update sort icons
      document.querySelectorAll('th span.text-xs').forEach(function (thSpan) {
        thSpan.textContent = '↕';
        thSpan.classList.remove('opacity-100');
        thSpan.classList.add('opacity-50');
      });
      var iconEl = document.getElementById('sort-' + key);
      if (iconEl) {
        iconEl.classList.remove('opacity-50');
        iconEl.classList.add('opacity-100');
        iconEl.textContent = sortAsc ? '↑' : '↓';
      }
      var sorted = allData.slice().sort(function (a, b) {
        var va = a[key] !== undefined ? a[key] : '';
        var vb = b[key] !== undefined ? b[key] : '';
        if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
        return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
      renderTable(sorted);
    }

    function exportCSV() {
      if (!allData.length) return;
      var headers = ['Name', 'Position', 'Technical', 'Problem Solving', 'Communication', 'System Design', 'Culture Fit', 'Final Score', 'Recommendation'];
      var rows = allData.map(function (c) {
        return [c.name, c.position, c.avgTechnical, c.avgProblemSolving, c.avgCommunication, c.avgSystemDesign, c.avgCultureFit, c.finalScore, c.recommendation || ''].map(function (v) {
          return '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"';
        }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'candidate-summary.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    google.script.run
      .withSuccessHandler(function (list) {
        allData = list;
        sortBy('finalScore'); // default sort: highest final score first
      })
      .withFailureHandler(function (e) {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="9" class="p-8 text-center font-bold text-[#b91c1c]">' + escHtml(e.message || e) + '</td></tr>';
      })
      .getSummary();
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary Dashboard — Interviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; }
    header { background: #2563eb; color: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.25rem; }
    header nav a { color: #bfdbfe; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
    .user-menu { display: flex; align-items: center; gap: 0.75rem; margin-left: 1.5rem; }
    .user-email { font-size: 0.82rem; color: #bfdbfe; }
    .btn-signout { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .btn-signout:hover { background: rgba(255,255,255,0.25); }
    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .toolbar h2 { font-size: 1.1rem; }
    button.export-btn { background: #059669; color: #fff; border: none; padding: 0.45rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    button.export-btn:hover { background: #047857; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); font-size: 0.875rem; }
    th, td { padding: 0.7rem 0.9rem; text-align: left; }
    th { background: #f1f5f9; font-weight: 600; color: #475569; cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { background: #e2e8f0; }
    th .sort-icon { margin-left: 4px; font-size: 0.7rem; opacity: 0.5; }
    th.sorted .sort-icon { opacity: 1; }
    tr:not(:last-child) td { border-bottom: 1px solid #e2e8f0; }
    tr:hover td { background: #f8fafc; }
    tr.strong-hire-row td { background: #f0fdf4; }
    tr.strong-hire-row:hover td { background: #dcfce7; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
    .strong-hire { background: #dcfce7; color: #15803d; }
    .hire        { background: #dbeafe; color: #1d4ed8; }
    .no-hire     { background: #fee2e2; color: #b91c1c; }
    .score       { font-variant-numeric: tabular-nums; }
    @media (max-width: 700px) {
      .container { padding: 0 0.5rem; }
      table { font-size: 0.78rem; }
      th, td { padding: 0.5rem 0.4rem; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6),
      th:nth-child(7), td:nth-child(7) { display: none; }
      .toolbar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      header nav a:not(:last-child) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Interviewer</h1>
    <nav>
      <a href="<?= webAppUrl ?>?page=candidates" target="_top">Candidates</a>
      <a href="<?= webAppUrl ?>?page=summary" target="_top">Summary</a>
      <div class="user-menu">
        <span class="user-email"><?= userEmail ?></span>
        <a class="btn-signout" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="toolbar">
      <h2>Summary Dashboard</h2>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <table id="summaryTable">
      <thead>
        <tr>
          <th onclick="sortBy('name')">Candidate <span class="sort-icon" id="sort-name">↕</span></th>
          <th onclick="sortBy('position')">Position <span class="sort-icon" id="sort-position">↕</span></th>
          <th onclick="sortBy('avgTechnical')">Technical <span class="sort-icon" id="sort-avgTechnical">↕</span></th>
          <th onclick="sortBy('avgProblemSolving')">Problem Solving <span class="sort-icon" id="sort-avgProblemSolving">↕</span></th>
          <th onclick="sortBy('avgCommunication')">Communication <span class="sort-icon" id="sort-avgCommunication">↕</span></th>
          <th onclick="sortBy('avgSystemDesign')">System Design <span class="sort-icon" id="sort-avgSystemDesign">↕</span></th>
          <th onclick="sortBy('avgCultureFit')">Culture Fit <span class="sort-icon" id="sort-avgCultureFit">↕</span></th>
          <th onclick="sortBy('finalScore')">Final Score <span class="sort-icon" id="sort-finalScore">↕</span></th>
          <th onclick="sortBy('recommendation')">Recommendation <span class="sort-icon" id="sort-recommendation">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="9" style="text-align:center;color:#94a3b8;">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    var allData = [];
    var sortKey = 'finalScore';
    var sortAsc = false;

    function badge(rec) {
      var cls = rec === 'Strong Hire' ? 'strong-hire' : rec === 'Hire' ? 'hire' : 'no-hire';
      return '<span class="badge ' + cls + '">' + escHtml(rec || '—') + '</span>';
    }
    function fmt(v) { return (v !== undefined && v !== '' && v !== null && !isNaN(v)) ? Number(v).toFixed(1) : '—'; }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }

    function renderTable(list) {
      var tbody = document.getElementById('tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#94a3b8;">No data yet.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(function(c) {
        var rec = c.recommendation || '';
        var rowCls = rec === 'Strong Hire' ? ' class="strong-hire-row"' : '';
        return '<tr' + rowCls + '>' +
          '<td>' + escHtml(c.name) + '</td>' +
          '<td>' + escHtml(c.position) + '</td>' +
          '<td class="score">' + fmt(c.avgTechnical) + '</td>' +
          '<td class="score">' + fmt(c.avgProblemSolving) + '</td>' +
          '<td class="score">' + fmt(c.avgCommunication) + '</td>' +
          '<td class="score">' + fmt(c.avgSystemDesign) + '</td>' +
          '<td class="score">' + fmt(c.avgCultureFit) + '</td>' +
          '<td class="score" style="font-weight:700">' + fmt(c.finalScore) + '</td>' +
          '<td>' + badge(rec) + '</td>' +
        '</tr>';
      }).join('');
    }

    function sortBy(key) {
      if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = false; }
      // Update sort icons
      document.querySelectorAll('th').forEach(function(th) { th.classList.remove('sorted'); });
      var iconEl = document.getElementById('sort-' + key);
      if (iconEl) {
        iconEl.parentElement.classList.add('sorted');
        iconEl.textContent = sortAsc ? '↑' : '↓';
      }
      var sorted = allData.slice().sort(function(a, b) {
        var va = a[key] !== undefined ? a[key] : '';
        var vb = b[key] !== undefined ? b[key] : '';
        if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
        return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
      renderTable(sorted);
    }

    function exportCSV() {
      if (!allData.length) return;
      var headers = ['Name','Position','Technical','Problem Solving','Communication','System Design','Culture Fit','Final Score','Recommendation'];
      var rows = allData.map(function(c) {
        return [c.name, c.position, c.avgTechnical, c.avgProblemSolving, c.avgCommunication, c.avgSystemDesign, c.avgCultureFit, c.finalScore, c.recommendation || ''].map(function(v) {
          return '"' + String(v === null || v === undefined ? '' : v).replace(/"/g, '""') + '"';
        }).join(',');
      });
      var csv = [headers.join(',')].concat(rows).join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'candidate-summary.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    google.script.run
      .withSuccessHandler(function(list) {
        allData = list;
        sortBy('finalScore'); // default sort: highest final score first
      })
      .withFailureHandler(function(e) {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="9" style="color:#b91c1c;">' + escHtml(e.message || e) + '</td></tr>';
      })
      .getSummary();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>

  <?!= include('html/shared/theme-head'); ?>
  <style type="text/tailwindcss">
    @layer base {
      html { color-scheme: light; }
      html.dark { color-scheme: dark; }
      body {
        @apply bg-base text-textBody;
        min-height: 100vh;
        transition: background-color 220ms ease, color 220ms ease;
        background-image: radial-gradient(circle at top left, rgba(52, 211, 153, 0.2), transparent 28%), radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 24%);
      }
      h1, h2, h3, h4, th { @apply text-textHeader; }
      input, select, textarea { @apply w-full p-6 rounded-[24px] bg-white shadow-sm border border-stone200 font-medium text-textBody focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all; }
    }
    .btn-primary { @apply inline-block bg-primary text-white rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-md transition-all hover:scale-[1.02] active:bg-secondary whitespace-nowrap cursor-pointer; }
    .btn-secondary { @apply inline-block bg-white text-textBody border border-stone200 rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-sm transition-all hover:scale-[1.02] whitespace-nowrap cursor-pointer; }
    .nav-btn { @apply bg-white text-textBody rounded-full px-6 py-2 font-display font-medium shadow-sm border border-stone200 transition-all hover:scale-[1.02] cursor-pointer text-sm; }
    
    .badge-active { @apply inline-block bg-primary/20 text-textHeader px-4 py-1 font-display font-medium tracking-wide text-xs rounded-full shadow-sm; }
    .badge-hired { @apply inline-block bg-secondary/20 text-textHeader border border-secondary/30 px-4 py-1 font-display font-medium tracking-wide text-xs rounded-full shadow-sm; }
    .badge-rejected { @apply inline-block bg-[#ff6b6b]/10 text-[#991b1b] border border-[#ff6b6b]/30 px-4 py-1 font-display font-medium tracking-wide text-xs rounded-full shadow-sm; }

    .theme-toggle { backdrop-filter: blur(18px); }

    html.dark body {
      background-color: #0F172A;
      background-image: radial-gradient(circle at top left, rgba(52, 211, 153, 0.16), transparent 24%), radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 22%), linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 1));
    }

    html.dark .bg-white,
    html.dark .card {
      background-color: rgba(15, 23, 42, 0.78) !important;
    }

    html.dark .bg-base,
    html.dark .bg-base\/70 {
      background-color: rgba(15, 23, 42, 0.72) !important;
    }

    html.dark .bg-stone200,
    html.dark .bg-stone200\/20,
    html.dark .bg-stone200\/30,
    html.dark .bg-stone200\/40,
    html.dark .bg-stone200\/50 {
      background-color: rgba(148, 163, 184, 0.12) !important;
    }

    html.dark .border-stone200 {
      border-color: rgba(148, 163, 184, 0.22) !important;
    }

    html.dark .ring-stone200 {
      --tw-ring-color: rgba(148, 163, 184, 0.24) !important;
    }

    html.dark .text-textBody,
    html.dark .text-dark {
      color: #CBD5E1 !important;
    }

    html.dark .text-textBody\/50 {
      color: rgba(203, 213, 225, 0.72) !important;
    }

    html.dark .text-textBody\/70,
    html.dark .text-gray-500 {
      color: rgba(148, 163, 184, 0.95) !important;
    }

    html.dark .text-textHeader {
      color: #ECFDF5 !important;
    }

    html.dark .bg-primary\/10 { background-color: rgba(16, 185, 129, 0.18) !important; }
    html.dark .bg-primary\/20 { background-color: rgba(16, 185, 129, 0.22) !important; }
    html.dark .bg-primary\/5 { background-color: rgba(16, 185, 129, 0.1) !important; }
    html.dark .bg-secondary\/20 { background-color: rgba(52, 211, 153, 0.18) !important; }
    html.dark .bg-dark\/20 { background-color: rgba(2, 6, 23, 0.68) !important; }

    html.dark .btn-secondary,
    html.dark .nav-btn,
    html.dark .theme-toggle {
      background-color: rgba(15, 23, 42, 0.84) !important;
      color: #E2E8F0 !important;
      border-color: rgba(148, 163, 184, 0.22) !important;
    }

    html.dark input,
    html.dark select,
    html.dark textarea {
      background-color: rgba(15, 23, 42, 0.82) !important;
      color: #E2E8F0 !important;
      border-color: rgba(148, 163, 184, 0.22) !important;
    }

    html.dark input::placeholder,
    html.dark textarea::placeholder {
      color: #94A3B8;
    }

    html.dark .shadow-sm,
    html.dark .shadow-md,
    html.dark .shadow-xl {
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.25) !important;
    }

    html.dark .hover\:bg-stone200\/20:hover { background-color: rgba(148, 163, 184, 0.1) !important; }
    html.dark .hover\:bg-stone200\/30:hover { background-color: rgba(148, 163, 184, 0.14) !important; }
    html.dark .hover\:bg-stone200\/40:hover { background-color: rgba(148, 163, 184, 0.18) !important; }
    html.dark .hover\:border-textBody:hover { border-color: rgba(209, 250, 229, 0.42) !important; }
    html.dark .hover\:text-textHeader:hover { color: #ECFDF5 !important; }

    html.dark .bg-red-50 { background-color: rgba(127, 29, 29, 0.24) !important; }
    html.dark .border-red-200 { border-color: rgba(248, 113, 113, 0.35) !important; }
    html.dark .text-red-700 { color: #FECACA !important; }
    html.dark .bg-green-50 { background-color: rgba(20, 83, 45, 0.26) !important; }
    html.dark .border-green-200 { border-color: rgba(74, 222, 128, 0.3) !important; }
    html.dark .text-green-700 { color: #BBF7D0 !important; }
  </style>
</head>
<body>
  <header class="bg-base/70 backdrop-blur-xl border-b border-stone200 text-textHeader p-6 md:px-10 flex justify-between items-center z-50 sticky top-0 mb-12">
    <h1 class="font-display text-3xl font-semibold tracking-tight text-textHeader">Interviewer</h1>
    <div class="flex items-center gap-3">
      <button id="themeToggle" class="nav-btn theme-toggle !px-4 flex items-center gap-3" type="button" onclick="toggleTheme()" aria-label="Toggle color theme">
        <span class="h-2.5 w-2.5 rounded-full bg-primary shadow-[0_0_0_4px_rgba(16,185,129,0.16)]"></span>
        <span id="themeToggleLabel" class="text-xs sm:text-sm">Dark mode</span>
      </button>
      <nav class="hidden md:flex gap-6 items-center">
        <a href="<?= webAppUrl ?>?page=candidates" target="_top" class="font-display font-medium tracking-wide text-textHeader font-semibold">Candidates</a>
        <a href="<?= webAppUrl ?>?page=summary" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Summary</a>
        <? if (isAdmin) { ?><a href="<?= webAppUrl ?>?page=admin" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Admin</a><? } ?>
        <div class="flex items-center gap-6 ml-4">
          <span class="text-sm font-bold text-textBody"><?= userEmail ?></span>
          <a class="nav-btn" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
        </div>
      </nav>
    </div>
  </header>

  <div class="max-w-5xl mx-auto p-6 md:p-10 mt-4">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
      <h2 class="font-display text-4xl font-medium tracking-tight">Candidates</h2>
      <? if (isAdmin) { ?>
        <button class="btn-primary" onclick="openAddModal()">+ Add Candidate</button>
      <? } ?>
    </div>

    <div id="msg" class="hidden mb-8 font-medium border border-stone200 p-6 shadow-sm rounded-[24px]"></div>

    <div class="flex flex-col md:flex-row gap-6 mb-12 bg-white border border-stone200 p-6 shadow-sm rounded-[24px]">
      <input type="text" id="searchInput" placeholder="Search by name or position…" oninput="filterTable()">
      <select id="statusFilter" onchange="filterTable()" class="w-full md:w-64">
        <option value="">All Statuses</option>
        <option value="Active">Active</option>
        <option value="Hired">Hired</option>
        <option value="Rejected">Rejected</option>
      </select>
    </div>

    <div class="overflow-x-auto bg-white border border-stone200 shadow-sm rounded-[24px]">
      <table id="candidateTable" class="w-full border-collapse" >
        <thead class="bg-stone200/20">
          <tr>
            <th class="p-6 text-left font-display font-medium tracking-wide text-textHeader border-b border-stone200 border-r">Name</th>
            <th class="p-6 text-left font-display font-medium tracking-wide text-textHeader border-b border-stone200 border-r">Position</th>
            <th class="p-6 text-left font-display font-medium tracking-wide text-textHeader border-b border-stone200 border-r hidden md:table-cell">Level</th>
            <th class="p-6 text-left font-display font-medium tracking-wide text-textHeader border-b border-stone200 border-r">Status</th>
            <th class="p-6 text-left font-display font-medium tracking-wide text-textHeader border-b border-stone200">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" class="p-10 text-center font-medium text-textBody">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add Candidate Modal -->
  <div class="fixed inset-0 bg-dark/20 backdrop-blur-sm z-[100] flex justify-center items-center hidden" id="addModal">
    <div class="bg-white border border-stone200 p-6 md:p-10 w-full max-w-lg shadow-xl rounded-[32px] mx-4 transform transition-all">
      <h3 class="font-semibold text-2xl tracking-tight text-textHeader mb-8">Add Candidate</h3>
      <div class="mb-4">
        <label class="block font-display font-medium tracking-wide text-sm mb-2">Full Name *</label>
        <input type="text" id="inputName" placeholder="Jane Doe">
      </div>
      <div class="mb-4">
        <label class="block font-display font-medium tracking-wide text-sm mb-2">Position *</label>
        <input type="text" id="inputPosition" placeholder="Senior Data Engineer">
      </div>
      <div class="mb-8">
        <label class="block font-display font-medium tracking-wide text-sm mb-2">Level</label>
        <select id="inputLevel">
          <option value="Junior">Junior</option>
          <option value="Mid" selected>Mid</option>
          <option value="Senior">Senior</option>
          <option value="Staff">Staff</option>
        </select>
      </div>
      <div class="flex justify-end gap-6 mt-6">
        <button class="btn-secondary" onclick="closeAddModal()">Cancel</button>
        <button class="btn-primary" onclick="submitAdd()">Add</button>
      </div>
    </div>
  </div>

  <?!= include('html/shared/theme-utils'); ?>
  <script>
    var APP_URL = '<?= webAppUrl ?>';
    var IS_ADMIN = <?!= JSON.stringify(isAdmin) ?>;
    var allCandidates = [];

    function statusBadge(status) {
      var cls = status === 'Hired' ? 'badge-hired' : status === 'Rejected' ? 'badge-rejected' : 'badge-active';
      return '<span class="' + cls + '">' + escHtml(status) + '</span>';
    }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function renderTable(list) {
      var tbody = document.getElementById('tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center font-bold text-gray-500">No candidates found.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(function(c) {
        var statusControls = '';
        if (IS_ADMIN) {
          statusControls = '<div class="inline-flex flex-wrap items-center gap-2 ml-2 align-middle">' +
            '<select id="status-' + escHtml(c.id) + '" class="w-32 !p-2 !text-xs !rounded-full">' +
              '<option value="Active"' + (c.status === 'Active' ? ' selected' : '') + '>Active</option>' +
              '<option value="Hired"' + (c.status === 'Hired' ? ' selected' : '') + '>Hired</option>' +
              '<option value="Rejected"' + (c.status === 'Rejected' ? ' selected' : '') + '>Rejected</option>' +
            '</select>' +
            '<button class="bg-white border border-stone200 text-textBody hover:border-textBody px-4 py-1.5 rounded-full shadow-sm transition-all text-xs inline-block" onclick="updateStatus(\'' + escHtml(c.id) + '\')">Save</button>' +
            '<button class="bg-[#fff1f2] border border-[#fecdd3] text-[#be123c] hover:bg-[#ffe4e6] px-4 py-1.5 rounded-full shadow-sm transition-all text-xs inline-block" onclick="confirmRemoveCandidate(\'' + escHtml(c.id) + '\')">Remove</button>' +
          '</div>';
        }
        return '<tr class="hover:bg-stone200/30 group cursor-pointer border-b border-stone200 last:border-b-0 transition-colors">' +
          '<td class="p-6 font-semibold text-textHeader border-r border-stone200">' + escHtml(c.name) + '</td>' +
          '<td class="p-6 font-medium text-textBody border-r border-stone200">' + escHtml(c.position) + '</td>' +
          '<td class="p-6 font-medium text-textBody border-r border-stone200 hidden md:table-cell">' + escHtml(c.level) + '</td>' +
          '<td class="p-6 border-r border-stone200">' + statusBadge(c.status) + '</td>' +
          '<td class="p-6 font-semibold space-x-2 whitespace-nowrap">' +
            '<a class="bg-primary hover:bg-secondary text-white px-4 py-1.5 rounded-full shadow-sm transition-all text-xs inline-block" href="' + APP_URL + '?page=eval&candidateId=' + encodeURIComponent(c.id) + '" target="_top">Evaluate</a>' +
            '<a class="bg-white border border-stone200 text-textBody hover:border-textBody px-4 py-1.5 rounded-full shadow-sm transition-all text-xs inline-block" href="' + APP_URL + '?page=report&candidateId=' + encodeURIComponent(c.id) + '" target="_top">Report</a>' +
            statusControls +
          '</td>' +
        '</tr>';
      }).join('');
    }

    function updateStatus(candidateId) {
      var select = document.getElementById('status-' + candidateId);
      if (!select) return;
      var nextStatus = select.value;

      google.script.run
        .withSuccessHandler(function() {
          allCandidates = allCandidates.map(function(candidate) {
            if (candidate.id === candidateId) {
              candidate.status = nextStatus;
            }
            return candidate;
          });
          filterTable();
          showSuccess('Candidate status updated to ' + nextStatus + '.');
        })
        .withFailureHandler(showError)
        .updateStatus(candidateId, nextStatus);
    }

    function confirmRemoveCandidate(candidateId) {
      var candidate = null;
      for (var i = 0; i < allCandidates.length; i++) {
        if (allCandidates[i].id === candidateId) {
          candidate = allCandidates[i];
          break;
        }
      }

      var candidateName = candidate ? candidate.name : 'this candidate';
      var confirmed = window.confirm('Remove ' + candidateName + '? This also deletes linked evaluations and summary data.');
      if (!confirmed) return;

      google.script.run
        .withSuccessHandler(function() {
          allCandidates = allCandidates.filter(function(existingCandidate) {
            return existingCandidate.id !== candidateId;
          });
          filterTable();
          showSuccess('Candidate removed.');
        })
        .withFailureHandler(showError)
        .deleteCandidate(candidateId);
    }

    function filterTable() {
      var q = document.getElementById('searchInput').value.toLowerCase();
      var s = document.getElementById('statusFilter').value;
      var filtered = allCandidates.filter(function(c) {
        var matchText = !q || c.name.toLowerCase().indexOf(q) !== -1 || c.position.toLowerCase().indexOf(q) !== -1;
        var matchStatus = !s || c.status === s;
        return matchText && matchStatus;
      });
      renderTable(filtered);
    }

    function loadCandidates() {
      google.script.run
        .withSuccessHandler(function(list) {
          allCandidates = list;
          renderTable(list);
        })
        .withFailureHandler(showError)
        .getCandidates();
    }

    function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
    function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }

    function submitAdd() {
      var name     = document.getElementById('inputName').value.trim();
      var position = document.getElementById('inputPosition').value.trim();
      var level    = document.getElementById('inputLevel').value;
      if (!name) { showError('Name is required.'); return; }
      google.script.run
        .withSuccessHandler(function() { closeAddModal(); loadCandidates(); showSuccess('Candidate added.'); })
        .withFailureHandler(showError)
        .createCandidate({ name: name, position: position, level: level });
    }

    function showError(e) {
      var msg = document.getElementById('msg');
      msg.className = 'mb-8 font-medium border border-red-200 p-6 shadow-sm rounded-[24px] block bg-red-50 text-red-700';
      msg.textContent = typeof e === 'string' ? e : (e.message || 'An error occurred.');
    }
    function showSuccess(text) {
      var msg = document.getElementById('msg');
      msg.className = 'mb-8 font-medium border border-green-200 p-6 shadow-sm rounded-[24px] block bg-green-50 text-green-700';
      msg.textContent = text;
    }

    loadCandidates();
  </script>
</body>
</html>

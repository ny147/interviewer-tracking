<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidates — Interviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; }
    header { background: #2563eb; color: #fff; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.25rem; }
    header nav a { color: #bfdbfe; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
    header nav a:hover { color: #fff; }
    .user-menu { display: flex; align-items: center; gap: 0.75rem; margin-left: 1.5rem; }
    .user-email { font-size: 0.82rem; color: #bfdbfe; }
    .btn-signout { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; text-decoration: none; transition: background 0.15s; }
    .btn-signout:hover { background: rgba(255,255,255,0.25); }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .toolbar h2 { font-size: 1.1rem; }
    .search-bar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .search-bar input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
    .search-bar select { padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; background: #fff; }
    button.primary { background: #2563eb; color: #fff; border: none; padding: 0.5rem 1.1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button.primary:hover { background: #1d4ed8; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    th, td { padding: 0.75rem 1rem; text-align: left; font-size: 0.9rem; }
    th { background: #f1f5f9; font-weight: 600; color: #475569; }
    tr:not(:last-child) td { border-bottom: 1px solid #e2e8f0; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-active  { background: #dcfce7; color: #15803d; }
    .badge-hired   { background: #dbeafe; color: #1d4ed8; }
    .badge-rejected{ background: #fee2e2; color: #b91c1c; }
    .action-link { color: #2563eb; text-decoration: none; font-size: 0.85rem; }
    .action-link:hover { text-decoration: underline; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; padding: 2rem; width: 100%; max-width: 440px; }
    .modal h3 { margin-bottom: 1.25rem; font-size: 1rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: #374151; }
    .field input, .field select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.25rem; }
    button.secondary { background: #e5e7eb; color: #374151; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .msg { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .msg.error   { background: #fee2e2; color: #b91c1c; display: block; }
    .msg.success { background: #dcfce7; color: #15803d; display: block; }
    @media (max-width: 640px) {
      .container { margin: 1rem auto; }
      .toolbar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .search-bar { flex-direction: column; }
      .search-bar input, .search-bar select { width: 100%; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.55rem 0.5rem; }
      th:nth-child(3), td:nth-child(3) { display: none; }
      .modal { margin: 0 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Interviewer</h1>
    <nav>
      <a href="<?= webAppUrl ?>?page=candidates" target="_top">Candidates</a>
      <a href="<?= webAppUrl ?>?page=summary" target="_top">Summary</a>
      <? if (isAdmin) { ?><a href="<?= webAppUrl ?>?page=admin" target="_top">Admin</a><? } ?>
      <div class="user-menu">
        <span class="user-email"><?= userEmail ?></span>
        <a class="btn-signout" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="toolbar">
      <h2>Candidates</h2>
      <? if (isAdmin) { ?>
        <button class="primary" onclick="openAddModal()">+ Add Candidate</button>
      <? } ?>
    </div>

    <div id="msg" class="msg"></div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name or position…" oninput="filterTable()">
      <select id="statusFilter" onchange="filterTable()">
        <option value="">All Statuses</option>
        <option value="Active">Active</option>
        <option value="Hired">Hired</option>
        <option value="Rejected">Rejected</option>
      </select>
    </div>

    <table id="candidateTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Position</th>
          <th>Level</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" style="text-align:center;color:#94a3b8;">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Add Candidate Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>Add Candidate</h3>
      <div class="field">
        <label>Full Name *</label>
        <input type="text" id="inputName" placeholder="Jane Doe">
      </div>
      <div class="field">
        <label>Position *</label>
        <input type="text" id="inputPosition" placeholder="Senior Data Engineer">
      </div>
      <div class="field">
        <label>Level</label>
        <select id="inputLevel">
          <option value="Junior">Junior</option>
          <option value="Mid" selected>Mid</option>
          <option value="Senior">Senior</option>
          <option value="Staff">Staff</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="secondary" onclick="closeAddModal()">Cancel</button>
        <button class="primary" onclick="submitAdd()">Add</button>
      </div>
    </div>
  </div>

  <script>
    var APP_URL = '<?= webAppUrl ?>';
    var allCandidates = [];

    function statusBadge(status) {
      var cls = status === 'Hired' ? 'badge-hired' : status === 'Rejected' ? 'badge-rejected' : 'badge-active';
      return '<span class="badge ' + cls + '">' + escHtml(status) + '</span>';
    }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function renderTable(list) {
      var tbody = document.getElementById('tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;">No candidates found.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(function(c) {
        return '<tr>' +
          '<td>' + escHtml(c.name) + '</td>' +
          '<td>' + escHtml(c.position) + '</td>' +
          '<td>' + escHtml(c.level) + '</td>' +
          '<td>' + statusBadge(c.status) + '</td>' +
          '<td>' +
            '<a class="action-link" href="' + APP_URL + '?page=eval&candidateId=' + encodeURIComponent(c.id) + '" target="_top">Evaluate</a>' +
            ' &nbsp; ' +
            '<a class="action-link" href="' + APP_URL + '?page=report&candidateId=' + encodeURIComponent(c.id) + '" target="_top" style="color:#6b7280;">Report</a>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    function filterTable() {
      var q = document.getElementById('searchInput').value.toLowerCase();
      var s = document.getElementById('statusFilter').value;
      var filtered = allCandidates.filter(function(c) {
        var matchText = !q || c.name.toLowerCase().indexOf(q) !== -1 || c.position.toLowerCase().indexOf(q) !== -1;
        var matchStatus = !s || c.status === s;
        return matchText && matchStatus;
      });
      renderTable(filtered);
    }

    function loadCandidates() {
      google.script.run
        .withSuccessHandler(function(list) {
          allCandidates = list;
          renderTable(list);
        })
        .withFailureHandler(showError)
        .getCandidates();
    }

    function openAddModal() { document.getElementById('addModal').classList.add('open'); }
    function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

    function submitAdd() {
      var name     = document.getElementById('inputName').value.trim();
      var position = document.getElementById('inputPosition').value.trim();
      var level    = document.getElementById('inputLevel').value;
      if (!name) { showError('Name is required.'); return; }
      google.script.run
        .withSuccessHandler(function() { closeAddModal(); loadCandidates(); showSuccess('Candidate added.'); })
        .withFailureHandler(showError)
        .createCandidate({ name: name, position: position, level: level });
    }

    function showError(e) {
      var msg = document.getElementById('msg');
      msg.className = 'msg error';
      msg.textContent = typeof e === 'string' ? e : (e.message || 'An error occurred.');
    }
    function showSuccess(text) {
      var msg = document.getElementById('msg');
      msg.className = 'msg success';
      msg.textContent = text;
    }

    loadCandidates();
  </script>
</body>
</html>

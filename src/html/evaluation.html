<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluate — Interviewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Epilogue', 'sans-serif'], display: ['Epilogue', 'sans-serif'] },
          colors: { 
            base: '#FAFAF9', 
            dark: '#0F172A', 
            primary: '#10B981', 
            secondary: '#34D399',
            textBody: '#44403C',
            textHeader: '#064E3B',
            stone200: '#E5E7EB',
            rebel: '#10B981'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-base text-textBody; }
      h1, h2, h3, h4, th { @apply text-textHeader; }
      input[type="range"] { @apply border-none bg-transparent shadow-none p-0 cursor-pointer; }
      textarea { @apply w-full p-4 border border-stone200 bg-white font-medium focus:outline-none focus:ring-2 focus:ring-primary/50 min-h-[120px] resize-y shadow-sm rounded-xl transition-all; }
    }
    .btn-primary { @apply inline-block bg-primary text-white rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-md transition-all hover:scale-[1.02] active:bg-secondary whitespace-nowrap cursor-pointer hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed; }
    .nav-btn { @apply bg-white text-textBody rounded-full px-6 py-2 font-display font-medium shadow-sm border border-stone200 transition-all hover:scale-[1.02] cursor-pointer text-sm; }
    .card { @apply bg-white shadow-sm border border-stone200 p-8 md:p-12 rounded-3xl mb-10; }
  </style>
</head>
<body>
  <header class="bg-base/80 backdrop-blur-xl border-b border-stone200 text-textHeader p-6 md:px-10 flex justify-between items-center z-50 sticky top-0 mb-8">
    <h1 class="font-display text-3xl font-semibold tracking-tight text-textHeader">Interviewer</h1>
    <nav class="hidden md:flex gap-6 items-center">
      <a href="<?= webAppUrl ?>?page=candidates" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Candidates</a>
      <a href="<?= webAppUrl ?>?page=summary" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Summary</a>
      <? if (isAdmin) { ?><a href="<?= webAppUrl ?>?page=admin" target="_top" class="font-display font-medium tracking-wide text-textBody hover:text-textHeader transition-all p-1">Admin</a><? } ?>
      <div class="flex items-center gap-4 ml-4">
        <span class="text-sm font-bold text-textBody"><?= userEmail ?></span>
        <a class="nav-btn" href="https://accounts.google.com/Logout" target="_top">Sign Out</a>
      </div>
    </nav>
  </header>

  <div class="max-w-2xl mx-auto p-4 md:p-8 mt-4">
    <a class="inline-block font-display font-medium tracking-wide tracking-tight text-textBody hover:text-textHeader border-none mb-6 transition-colors" href="<?= webAppUrl ?>?page=candidates" target="_top">← Back to Candidates</a>

    <div class="card">
      <h2 class="font-display text-4xl font-semibold tracking-tight text-textHeader mb-8 border-b border-stone200 pb-4">Evaluation Form</h2>
      <div id="msg" class="hidden mb-6 font-medium border border-stone200 p-4 shadow-sm rounded-xl"></div>

      <form id="evalForm" onsubmit="submitForm(event)">

        <div class="mb-8 p-4 bg-stone200/20 border border-stone200 shadow-sm rounded-xl flex flex-col hover:bg-stone200/40 transition-colors">
          <label class="flex justify-between font-display font-medium tracking-wide text-lg text-textHeader mb-2">Technical <span id="val-technical" class="text-white bg-primary font-bold px-3 py-0.5 rounded-full shadow-sm">5</span></label>
          <input type="range" id="technical" name="technical" min="1" max="10" value="5" class="w-full accent-primary h-2 bg-stone200 rounded-full outline-none" oninput="document.getElementById('val-technical').textContent=this.value">
        </div>

        <div class="mb-8 p-4 bg-stone200/20 border border-stone200 shadow-sm rounded-xl flex flex-col hover:bg-stone200/40 transition-colors">
          <label class="flex justify-between font-display font-medium tracking-wide text-lg text-textHeader mb-2">Leadership <span id="val-leadership" class="text-white bg-primary font-bold px-3 py-0.5 rounded-full shadow-sm">5</span></label>
          <input type="range" id="leadership" name="leadership" min="1" max="10" value="5" class="w-full accent-primary h-2 bg-stone200 rounded-full outline-none" oninput="document.getElementById('val-leadership').textContent=this.value">
        </div>

        <div class="mb-8 p-4 bg-stone200/20 border border-stone200 shadow-sm rounded-xl flex flex-col hover:bg-stone200/40 transition-colors">
          <label class="flex justify-between font-display font-medium tracking-wide text-lg text-textHeader mb-2">Stakeholder <span id="val-stakeholder" class="text-white bg-primary font-bold px-3 py-0.5 rounded-full shadow-sm">5</span></label>
          <input type="range" id="stakeholder" name="stakeholder" min="1" max="10" value="5" class="w-full accent-primary h-2 bg-stone200 rounded-full outline-none" oninput="document.getElementById('val-stakeholder').textContent=this.value">
        </div>

        <div class="mb-8">
          <label class="block font-display font-medium tracking-wide text-xl mb-3">Notes</label>
          <textarea id="notes" placeholder="Optional observations, questions asked, red flags…"></textarea>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Submit Evaluation</button>
      </form>
    </div>
  </div>

  <script>
    var candidateId = '<?= candidateId ?>';
    var APP_URL     = '<?= webAppUrl ?>';
    var existingEvalId = null;

    function goToCandidates() {
      window.open(APP_URL + '?page=candidates', '_top');
    }

    // Try to load existing evaluation for this user
    google.script.run
      .withSuccessHandler(function(eval_) {
        if (!eval_) return; // no prior eval — stay in submit mode
        existingEvalId = eval_.id;
        // Pre-fill sliders
        var map = {
          technical:   eval_.scores.technical,
          leadership:  eval_.scores.leadership,
          stakeholder: eval_.scores.stakeholder
        };
        Object.keys(map).forEach(function(key) {
          var el = document.getElementById(key);
          if (el && map[key]) {
            el.value = map[key];
            var label = document.getElementById('val-' + key);
            if (label) label.textContent = map[key];
          }
        });
        if (eval_.notes) document.getElementById('notes').value = eval_.notes;
        // Switch button to Update
        var btn = document.getElementById('submitBtn');
        btn.textContent = 'Update Evaluation';
        btn.className = 'w-full inline-block bg-white text-textBody border border-stone200 rounded-full px-8 py-3 font-display font-medium tracking-wide shadow-sm transition-all hover:scale-[1.02] hover:shadow cursor-pointer disabled:opacity-50';
        // Show info banner
        var msg = document.getElementById('msg');
        msg.className = 'mb-6 font-medium border border-blue-200 p-4 shadow-sm rounded-xl block bg-blue-50 text-blue-700';
        msg.textContent = 'You have already evaluated this candidate. You can update your scores below.';
      })
      .withFailureHandler(function() {}) // silently ignore — will be submit mode
      .getMyEvaluation(candidateId);

    function submitForm(e) {
      e.preventDefault();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = existingEvalId ? 'Updating…' : 'Submitting…';

      var scores = {
        technical: parseInt(document.getElementById('technical').value, 10),
        leadership: parseInt(document.getElementById('leadership').value, 10),
        stakeholder: parseInt(document.getElementById('stakeholder').value, 10)
      };
      var notes = document.getElementById('notes').value.trim();

      function onSuccess() {
        showSuccess((existingEvalId ? 'Evaluation updated' : 'Evaluation submitted') + '! Redirecting…');
        setTimeout(function() {
          goToCandidates();
        }, 900);
      }
      function onFailure(err) {
        btn.disabled = false;
        btn.textContent = existingEvalId ? 'Update Evaluation' : 'Submit Evaluation';
        showError(err);
      }

      if (existingEvalId) {
        google.script.run
          .withSuccessHandler(onSuccess)
          .withFailureHandler(onFailure)
          .updateEval(existingEvalId, { candidateId: candidateId, scores: scores, notes: notes });
      } else {
        google.script.run
          .withSuccessHandler(onSuccess)
          .withFailureHandler(onFailure)
          .submitEval({ candidateId: candidateId, scores: scores, notes: notes });
      }
    }

    function showError(e) {
      var msg = document.getElementById('msg');
      msg.className = 'mb-6 font-medium border border-red-200 p-4 shadow-sm rounded-xl block bg-red-50 text-red-700';
      msg.textContent = typeof e === 'string' ? e : (e.message || 'An error occurred.');
    }
    function showSuccess(text) {
      var msg = document.getElementById('msg');
      msg.className = 'mb-6 font-medium border border-green-200 p-4 shadow-sm rounded-xl block bg-green-50 text-green-700';
      msg.textContent = text;
    }
  </script>
</body>
</html>
